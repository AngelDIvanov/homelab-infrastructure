global:
  resolve_timeout: 5m
  slack_api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'

route:
  group_by: ['alertname', 'namespace', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'slack-info'
  routes:
    - match:
        severity: critical
      receiver: 'slack-critical'
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: 'slack-warning'
      repeat_interval: 4h
    - match:
        severity: info
      receiver: 'slack-info'
      repeat_interval: 24h

receivers:
  - name: 'slack-critical'
    slack_configs:
      - channel: '#incidents'
        api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
        send_resolved: true
        color: 'danger'
        title: '[CRITICAL] {{ .GroupLabels.alertname }}'
        title_link: 'http://192.168.122.218:30090/alerts'
        text: |
          {{ range .Alerts -}}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Namespace:* `{{ .Labels.namespace }}`
          *Started:* {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}
          *On-call:* <!here> <!here> — please investigate
          {{ end }}
        footer: 'Homelab Alertmanager | http://192.168.122.218:30093'

  - name: 'slack-warning'
    slack_configs:
      - channel: '#all-homelab-alerts'
        send_resolved: true
        color: 'warning'
        title: '[WARNING] {{ .GroupLabels.alertname }}'
        title_link: 'http://192.168.122.218:30090/alerts'
        text: |
          {{ range .Alerts -}}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Namespace:* `{{ .Labels.namespace }}`
          *Started:* {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}
          *FYI:* <!here> <!here>
          {{ end }}
        footer: 'Homelab Alertmanager | http://192.168.122.218:30093'

  - name: 'slack-info'
    slack_configs:
      - channel: '#all-homelab-alerts'
        send_resolved: true
        color: 'good'
        title: '[INFO] {{ .GroupLabels.alertname }}'
        title_link: 'http://192.168.122.218:30090/alerts'
        text: |
          {{ range .Alerts -}}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          {{ end }}
        footer: 'Homelab Alertmanager | http://192.168.122.218:30093'

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'namespace']
