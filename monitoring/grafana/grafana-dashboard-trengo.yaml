---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-trengo
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Homelab"
data:
  trengo.json: |
    {
      "title": "Trengo App",
      "uid": "homelab-trengo",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "tags": ["homelab", "trengo", "loki"],
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "browser",
      "editable": true,
      "graphTooltip": 1,
      "annotations": {
        "list": [
          {
            "name": "Deployments",
            "datasource": { "type": "grafana", "uid": "-- Grafana --" },
            "enable": true,
            "hide": false,
            "iconColor": "green",
            "type": "tags",
            "tags": ["deployment"],
            "showIn": 0
          },
          {
            "name": "Rollbacks",
            "datasource": { "type": "grafana", "uid": "-- Grafana --" },
            "enable": true,
            "hide": false,
            "iconColor": "red",
            "type": "tags",
            "tags": ["rollback"],
            "showIn": 0
          }
        ]
      },
      "panels": [

        {
          "id": 1,
          "title": "Available Replicas",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_available{deployment=\"trengo-search\"}",
              "legendFormat": "Available",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red",    "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "green",  "value": 2 }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          }
        },

        {
          "id": 2,
          "title": "Desired Replicas",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "kube_deployment_spec_replicas{deployment=\"trengo-search\"}",
              "legendFormat": "Desired",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "fixed", "fixedColor": "blue" }
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none"
          }
        },

        {
          "id": 3,
          "title": "Pod Restarts (last 1h)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=\"default\", pod=~\"trengo-search.*\"}[1h]))",
              "legendFormat": "Restarts",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green",  "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red",    "value": 5 }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          }
        },

        {
          "id": 4,
          "title": "Pod Phase",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "count by (phase) (kube_pod_status_phase{namespace=\"default\", pod=~\"trengo-search.*\"} == 1)",
              "legendFormat": "{{phase}}",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "palette-classic" }
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "value_and_name",
            "colorMode": "value",
            "graphMode": "none"
          }
        },

        {
          "id": 10,
          "title": "Log Volume -- trengo-search",
          "type": "timeseries",
          "gridPos": { "h": 6, "w": 24, "x": 0, "y": 4 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "expr": "sum(count_over_time({namespace=\"default\", pod=~\"trengo-search.*\"}[1m]))",
              "legendFormat": "All logs",
              "refId": "A"
            },
            {
              "expr": "sum(count_over_time({namespace=\"default\", pod=~\"trengo-search.*\"} |~ \"(?i)error|fatal|panic|exception\" [1m]))",
              "legendFormat": "Errors",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "palette-classic" }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Errors" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "All logs" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "blue" } }
                ]
              }
            ]
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          }
        },

        {
          "id": 20,
          "title": "All Logs -- trengo-search",
          "type": "logs",
          "gridPos": { "h": 14, "w": 24, "x": 0, "y": 10 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "expr": "{namespace=\"default\", pod=~\"trengo-search.*\"} != \"kube-probe\"",
              "refId": "A",
              "maxLines": 500
            }
          ],
          "options": {
            "showTime": true,
            "showLabels": false,
            "showCommonLabels": true,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "dedupStrategy": "none",
            "sortOrder": "Descending"
          }
        },

        {
          "id": 21,
          "title": "Errors Only -- trengo-search",
          "type": "logs",
          "gridPos": { "h": 14, "w": 24, "x": 0, "y": 24 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "expr": "{namespace=\"default\", pod=~\"trengo-search.*\"} |~ \"(?i)error|fatal|panic|exception|traceback|killed|oom\"",
              "refId": "A",
              "maxLines": 500
            },
            {
              "expr": "{job=\"trengo-health-check\"}",
              "refId": "B",
              "maxLines": 500
            }
          ],
          "options": {
            "showTime": true,
            "showLabels": true,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "dedupStrategy": "none",
            "sortOrder": "Descending"
          }
        }

      ]
    }
