apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: homelab-alerts
  namespace: monitoring
  labels:
    release: monitoring
    app: kube-prometheus-stack
spec:
  groups:
    - name: homelab.rules
      rules:

        - alert: TrengoAppDown
          expr: kube_deployment_status_replicas_available{deployment="trengo-search"} == 0
          for: 30s
          labels:
            severity: critical
          annotations:
            summary: "Trengo app is completely down"
            description: "Deployment trengo-search has 0 available replicas for more than 30 seconds."

        - alert: TrengoAppDegraded
          expr: kube_deployment_status_replicas_available{deployment="trengo-search"} < kube_deployment_spec_replicas{deployment="trengo-search"}
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Trengo app is degraded (fewer replicas than desired)"
            description: "Deployment trengo-search has fewer available replicas than desired for more than 2 minutes."

        - alert: PodImagePullError
          expr: kube_pod_container_status_waiting_reason{reason=~"ErrImagePull|ImagePullBackOff|ErrImageNeverPull"} == 1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Pod stuck on image pull error"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} cannot pull image ({{ $labels.reason }})."

        - alert: PodCrashLooping
          expr: increase(kube_pod_container_status_restarts_total[15m]) > 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod is crash-looping"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has restarted more than 3 times in the last 15 minutes."

        - alert: NodeDiskHigh
          expr: 100 - ((node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100) > 75
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Node disk usage is high"
            description: "Node {{ $labels.instance }} disk usage is above 75% (current: {{ $value | printf \"%.1f\" }}%)."

        - alert: NodeMemoryWarning
          expr: 100 * (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Node memory usage is high"
            description: "Node {{ $labels.instance }} memory usage is above 80% (current: {{ $value | printf \"%.1f\" }}%). Monitor closely."

        - alert: NodeMemoryHigh
          expr: 100 * (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 85
          for: 30s
          labels:
            severity: critical
          annotations:
            summary: "Node memory usage is critical — auto-remediation triggered"
            description: "Node {{ $labels.instance }} memory usage is above 85% (current: {{ $value | printf \"%.1f\" }}%). Auto-restart initiated."

        - alert: NodeMemoryCritical
          expr: 100 * (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 90
          for: 30s
          labels:
            severity: critical
          annotations:
            summary: "Node memory critical — auto-remediation triggered"
            description: "Node {{ $labels.instance }} memory above 90% (current: {{ $value | printf \"%.1f\" }}%). Auto-restart initiated."

        - alert: NodeDiskCritical
          expr: 100 - ((node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100) > 90
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Node disk usage is critical"
            description: "Node {{ $labels.instance }} disk usage is above 90% (current: {{ $value | printf \"%.1f\" }}%). Immediate action required."

        # K3sWorkerNodeDown — informational alert for worker nodes going down.
        # Excludes k3s-infra (monitoring node) — if that goes down, Prometheus
        # can't send alerts anyway. ci-runner is not in k3s so never appears here.
        - alert: K3sWorkerNodeDown
          expr: kube_node_status_condition{condition="Ready",status="true",node!="k3s-infra"} == 0
          for: 1m
          labels:
            severity: info
          annotations:
            summary: "K3s worker node is down — cluster is handling it"
            description: "Node *{{ $labels.node }}* is NotReady. Kubernetes has automatically rescheduled all workloads to healthy nodes. No immediate action required — please power the node back on when you get a chance."

        # KubeNodeNotReady — scoped to infra only. Workers are handled by K3sWorkerNodeDown above.
        - alert: KubeNodeNotReady
          expr: kube_node_status_condition{condition="Ready",status="true",node="k3s-infra"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "k3s-infra node is not ready — monitoring stack may be affected"
            description: "Node {{ $labels.node }} has been in a NotReady state for more than 2 minutes. Prometheus, Grafana and Alertmanager run on this node."

        - alert: ContainerOOMKilled
          expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1 and increase(kube_pod_container_status_restarts_total[15m]) > 0
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "Container was OOM killed"
            description: "Container {{ $labels.container }} in pod {{ $labels.pod }} (namespace {{ $labels.namespace }}) was OOM killed. Node memory pressure is a separate signal — a node at 60% can still OOM-kill containers with tight limits."

        - alert: PVCPending
          expr: kube_persistentvolumeclaim_status_phase{phase="Pending"} == 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "PVC is stuck in Pending"
            description: "PVC {{ $labels.persistentvolumeclaim }} in namespace {{ $labels.namespace }} has been Pending for more than 5 minutes. Any pod depending on it cannot start."

        - alert: CronJobFailed
          expr: (kube_job_status_failed * on(namespace, job_name) group_left(owner_name) kube_job_owner{owner_kind="CronJob"}) > 0
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "CronJob has failed executions"
            description: "CronJob {{ $labels.owner_name }} in namespace {{ $labels.namespace }} has {{ $value }} failed job pod(s). Check logs for job {{ $labels.job_name }}."

        - alert: CheckLabFailed
          expr: >
            (kube_job_status_failed
              * on(namespace, job_name) group_left(owner_name)
              kube_job_owner{owner_kind="CronJob", owner_name="check-lab"}
            ) > 0
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "check-lab health check detected cluster issues"
            description: "The check-lab CronJob (job {{ $labels.job_name }}, namespace {{ $labels.namespace }}) reported {{ $value }} failure(s). Check pod logs: kubectl logs -n default -l app=check-lab --previous"

        - alert: CheckLabNotScheduled
          expr: time() - kube_cronjob_status_last_schedule_time{cronjob="check-lab"} > 1200
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "check-lab CronJob has not run in 20 minutes"
            description: "check-lab last ran {{ $value | humanizeDuration }} ago (expected every 15 min). CronJob may be suspended or the cluster scheduler is unhealthy. Check: kubectl get cronjob check-lab -n default"

        - alert: K3sControlPlaneUnhealthy
          expr: up{job="apiserver"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "k3s control plane is unreachable"
            description: "The Kubernetes API server scrape target has been down for 2+ minutes. In k3s, the scheduler and controller-manager are embedded in the same binary — this is the canonical control plane health signal replacing the silenced KubeSchedulerDown and KubeControllerManagerDown upstreams."
