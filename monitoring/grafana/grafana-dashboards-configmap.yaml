---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-all-nodes
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Homelab"
data:
  all-nodes.json: |
    {
      "title": "All Nodes Dash",
      "uid": "homelab-allnodes",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "tags": ["homelab"],
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "browser",
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "id": 1,
          "title": "RAM Usage % — All Nodes",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "100 * (1 - (node_memory_MemAvailable_bytes{job=\"node-exporter\"} / node_memory_MemTotal_bytes{job=\"node-exporter\"})) * on(instance) group_left(nodename) node_uname_info",
              "legendFormat": "{{nodename}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "color": { "mode": "palette-classic" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 60 },
                  { "color": "red", "value": 80 }
                ]
              }
            }
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          }
        },
        {
          "id": 2,
          "title": "CPU Usage % — All Nodes",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "100 - (avg by (instance) (rate(node_cpu_seconds_total{job=\"node-exporter\",mode=\"idle\"}[5m])) * 100) * on(instance) group_left(nodename) node_uname_info",
              "legendFormat": "{{nodename}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "color": { "mode": "palette-classic" }
            }
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          }
        },
        {
          "id": 3,
          "title": "Disk Usage % — All Nodes",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "100 - ((node_filesystem_avail_bytes{job=\"node-exporter\",mountpoint=\"/\",fstype!=\"tmpfs\"} / node_filesystem_size_bytes{job=\"node-exporter\",mountpoint=\"/\",fstype!=\"tmpfs\"}) * 100) * on(instance) group_left(nodename) node_uname_info",
              "legendFormat": "{{nodename}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "color": { "mode": "palette-classic" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 60 },
                  { "color": "red", "value": 75 }
                ]
              }
            }
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          }
        },
        {
          "id": 4,
          "title": "Network Traffic (receive) — All Nodes",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum by (nodename) (\n  rate(node_network_receive_bytes_total{job=\"node-exporter\",device!=\"lo\"}[5m])\n  * on(instance) group_left(nodename) node_uname_info\n)",
              "legendFormat": "{{nodename}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "color": { "mode": "palette-classic" }
            }
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          }
        },
        {
          "id": 5,
          "title": "Network Traffic (sent) — All Nodes",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum by (nodename) (\n  rate(node_network_transmit_bytes_total{job=\"node-exporter\",device!=\"lo\"}[5m])\n  * on(instance) group_left(nodename) node_uname_info\n)",
              "legendFormat": "{{nodename}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "color": { "mode": "palette-classic" }
            }
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          }
        }
      ]
    }

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-api-health
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Homelab"
data:
  api-health.json: |
    {
      "title": "API dash",
      "uid": "homelab-apidash",
      "schemaVersion": 38,
      "version": 2,
      "refresh": "30s",
      "tags": ["homelab"],
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "browser",
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "id": 1,
          "title": "API Server — Request Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(apiserver_request_total{job=\"apiserver\"}[5m])) by (verb)",
              "legendFormat": "{{verb}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps", "color": { "mode": "palette-classic" } }
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          }
        },
        {
          "id": 2,
          "title": "API Server — Error Rate vs Total Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(apiserver_request_total{job=\"apiserver\"}[5m]))",
              "legendFormat": "Total",
              "refId": "A"
            },
            {
              "expr": "sum(rate(apiserver_request_total{job=\"apiserver\",code=~\"4..|5..\"}[5m]))",
              "legendFormat": "Errors (4xx+5xx)",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps", "color": { "mode": "palette-classic" } },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Errors (4xx+5xx)" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Total" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "green" } }
                ]
              }
            ]
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          }
        },
        {
          "id": 3,
          "title": "API Server — Error Rate by HTTP Code",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(apiserver_request_total{job=\"apiserver\",code=~\"4..|5..\"}[5m])) by (code)",
              "legendFormat": "HTTP {{code}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps", "color": { "mode": "palette-classic" } }
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          }
        },
        {
          "id": 4,
          "title": "API Server — Errors by Verb (GET/POST/DELETE/etc)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(apiserver_request_total{job=\"apiserver\",code=~\"4..|5..\"}[5m])) by (verb)",
              "legendFormat": "{{verb}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps", "color": { "mode": "palette-classic" } }
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          }
        },
        {
          "id": 5,
          "title": "API Server — Errors by Resource (pods/deployments/etc)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(apiserver_request_total{job=\"apiserver\",code=~\"4..|5..\"}[5m])) by (resource)",
              "legendFormat": "{{resource}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps", "color": { "mode": "palette-classic" } }
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          }
        },
        {
          "id": 6,
          "title": "API Server — Top Erroring Endpoints",
          "type": "table",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "topk(15, sum(rate(apiserver_request_total{job=\"apiserver\",code=~\"4..|5..\"}[5m])) by (verb, resource, code))",
              "legendFormat": "{{verb}} {{resource}} {{code}}",
              "refId": "A",
              "instant": true,
              "format": "table"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps" },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "code" },
                "properties": [
                  {
                    "id": "custom.displayMode",
                    "value": "color-background"
                  },
                  {
                    "id": "mappings",
                    "value": [
                      { "options": { "pattern": "4..", "result": { "color": "yellow" } }, "type": "regex" },
                      { "options": { "pattern": "5..", "result": { "color": "red" } }, "type": "regex" }
                    ]
                  }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Value" },
                "properties": [
                  { "id": "displayName", "value": "req/s" },
                  { "id": "unit", "value": "reqps" }
                ]
              }
            ]
          },
          "options": {
            "sortBy": [{ "displayName": "req/s", "desc": true }],
            "footer": { "show": false }
          },
          "transformations": [
            { "id": "labelsToFields", "options": { "mode": "columns" } },
            {
              "id": "organize",
              "options": {
                "excludeByName": { "Time": true, "__name__": true, "job": true, "instance": true },
                "indexByName": { "verb": 0, "resource": 1, "code": 2, "Value": 3 }
              }
            }
          ]
        },
        {
          "id": 7,
          "title": "API Server — p99 Latency",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate(apiserver_request_duration_seconds_bucket{job=\"apiserver\"}[5m])) by (le, verb))",
              "legendFormat": "{{verb}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "s", "color": { "mode": "palette-classic" } }
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          }
        },
        {
          "id": 8,
          "title": "Scheduler — Attempts by Result",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(scheduler_scheduling_attempt_duration_seconds_count[5m])) by (result)",
              "legendFormat": "{{result}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "ops", "color": { "mode": "palette-classic" } }
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          }
        },
        {
          "id": 9,
          "title": "Controller Manager — Work Queue",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 32 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(workqueue_adds_total{job=~\"apiserver|kubelet\"}[5m])) by (name, job)",
              "legendFormat": "{{job}}/{{name}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "ops", "color": { "mode": "palette-classic" } }
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          }
        },
        {
          "id": 10,
          "title": "Pod Restarts (last 6h) — Top 10",
          "type": "bargauge",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 32 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "topk(10, sum(kube_pod_container_status_restarts_total) by (pod, namespace) > 0)",
              "legendFormat": "{{namespace}}/{{pod}}",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 10 },
                  { "color": "red", "value": 50 }
                ]
              }
            }
          },
          "options": {
            "orientation": "horizontal",
            "displayMode": "gradient",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          }
        }
      ]
    }

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-log-explorer
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Homelab"
data:
  log-explorer.json: |
    {
      "title": "Log Explorer",
      "uid": "homelab-logexplorer",
      "schemaVersion": 38,
      "version": 2,
      "refresh": "30s",
      "tags": ["homelab", "loki"],
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "browser",
      "editable": true,
      "graphTooltip": 1,
      "templating": {
        "list": [
          {
            "name": "namespace",
            "label": "Namespace",
            "type": "query",
            "datasource": { "type": "loki", "uid": "loki" },
            "query": "label_values(namespace)",
            "refresh": 2,
            "sort": 1,
            "multi": false,
            "includeAll": false,
            "current": { "text": "default", "value": "default" }
          },
          {
            "name": "pod",
            "label": "Pod",
            "type": "query",
            "datasource": { "type": "loki", "uid": "loki" },
            "query": "label_values({namespace=\"$namespace\"}, pod)",
            "refresh": 2,
            "sort": 1,
            "multi": false,
            "includeAll": true,
            "allValue": ".+",
            "current": {}
          },
          {
            "name": "level",
            "label": "Level",
            "type": "custom",
            "query": "All,error,warn,info,debug",
            "current": { "text": "error", "value": "error" },
            "options": [
              { "text": "All", "value": ".*", "selected": false },
              { "text": "error", "value": "error", "selected": true },
              { "text": "warn", "value": "warn", "selected": false },
              { "text": "info", "value": "info", "selected": false },
              { "text": "debug", "value": "debug", "selected": false }
            ],
            "multi": false,
            "includeAll": false
          },
          {
            "name": "search",
            "label": "Search",
            "type": "textbox",
            "current": { "text": "", "value": "" },
            "query": ""
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Log Volume — $namespace / $pod",
          "type": "timeseries",
          "gridPos": { "h": 6, "w": 24, "x": 0, "y": 0 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "expr": "sum(count_over_time({namespace=\"$namespace\", pod=~\"$pod\"} | label_format msg=\"\" | drop __error__, __error_details__ [1m]))",
              "legendFormat": "All logs",
              "refId": "A"
            },
            {
              "expr": "sum(count_over_time({namespace=\"$namespace\", pod=~\"$pod\"} | label_format msg=\"\" | drop __error__, __error_details__ |~ \"(?i)error|exception|fatal|panic\" [1m]))",
              "legendFormat": "Errors",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short", "color": { "mode": "palette-classic" } },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Errors" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "All logs" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "blue" } }
                ]
              }
            ]
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          }
        },
        {
          "id": 2,
          "title": "Log Volume by Pod — $namespace",
          "type": "timeseries",
          "gridPos": { "h": 6, "w": 12, "x": 0, "y": 6 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "expr": "sum by (pod) (count_over_time({namespace=\"$namespace\"} | drop __error__, __error_details__ [1m]))",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short", "color": { "mode": "palette-classic" } }
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          }
        },
        {
          "id": 3,
          "title": "Error Rate by Pod — $namespace",
          "type": "timeseries",
          "gridPos": { "h": 6, "w": 12, "x": 12, "y": 6 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "expr": "sum by (pod) (count_over_time({namespace=\"$namespace\"} | drop __error__, __error_details__ |~ \"(?i)error|exception|fatal|panic\" [1m]))",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "palette-classic" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 10 }
                ]
              }
            }
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          }
        },
        {
          "id": 4,
          "title": "Live Logs — $namespace / $pod  [level=$level]",
          "type": "logs",
          "gridPos": { "h": 16, "w": 24, "x": 0, "y": 12 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "expr": "{namespace=\"$namespace\", pod=~\"$pod\"} | drop __error__, __error_details__ | drop caller | not_contains_field(\"caller\", \"metrics.go\") |~ \"(?i)$level\" |~ \"$search\"",
              "refId": "A",
              "maxLines": 500
            }
          ],
          "options": {
            "showTime": true,
            "showLabels": false,
            "showCommonLabels": true,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "dedupStrategy": "none",
            "sortOrder": "Descending"
          }
        },
        {
          "id": 5,
          "title": "Errors Only — $namespace / $pod  (excludes Loki internals)",
          "type": "logs",
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 28 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "expr": "{namespace=\"$namespace\", pod=~\"$pod\"} | drop __error__, __error_details__ != \"caller=metrics.go\" != \"caller=roundtrip.go\" != \"caller=engine.go\" != \"caller=querier.go\" |~ \"(?i)error|exception|fatal|panic|warn\"",
              "refId": "A",
              "maxLines": 100
            }
          ],
          "options": {
            "showTime": true,
            "showLabels": true,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "dedupStrategy": "none",
            "sortOrder": "Descending"
          }
        }
      ]
    }
