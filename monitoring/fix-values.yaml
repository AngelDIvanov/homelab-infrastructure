grafana:
  plugins:
    - yesoreyeram-infinity-datasource
  persistence:
    enabled: true
    size: 2Gi
  service:
    type: NodePort
    nodePort: 30080
  initChownData:
    enabled: false
  nodeSelector:
    kubernetes.io/hostname: k3s-infra
  tolerations:
    - key: node-role
      operator: Equal
      value: infra
      effect: NoSchedule

prometheus:
  verticalPodAutoscaler:
    enabled: false
  prometheusSpec:
    nodeSelector:
      kubernetes.io/hostname: k3s-infra
    tolerations:
      - key: node-role
        operator: Equal
        value: infra
        effect: NoSchedule
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
  service:
    type: NodePort
    nodePort: 30090

alertmanager:
  verticalPodAutoscaler:
    enabled: false
  alertmanagerSpec:
    logLevel: info
    nodeSelector:
      kubernetes.io/hostname: k3s-infra
    tolerations:
      - key: node-role
        operator: Equal
        value: infra
        effect: NoSchedule
  service:
    type: NodePort
    nodePort: 30093
  config:
    global:
      resolve_timeout: 30s
    route:
      group_by: ['alertname', 'namespace', 'severity']
      group_wait: 10s
      group_interval: 30s
      repeat_interval: 4h
      receiver: gitlab-webhook
      routes:
        - match:
            severity: critical
          receiver: gitlab-webhook
          repeat_interval: 4h
        - match:
            severity: warning
          receiver: gitlab-webhook
          repeat_interval: 4h
        - match:
            severity: info
          receiver: gitlab-webhook
          repeat_interval: 24h
    receivers:
      - name: gitlab-webhook
        webhook_configs:
          - url: 'http://alertmanager-webhook:8080'
            send_resolved: true
    inhibit_rules:
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal:
          - alertname
          - namespace

kube-state-metrics:
  nodeSelector:
    kubernetes.io/hostname: k3s-infra
  tolerations:
    - key: node-role
      operator: Equal
      value: infra
      effect: NoSchedule

# Node exporter needs to run on every node — ensure it tolerates the infra taint
prometheus-node-exporter:
  tolerations:
    - key: node-role
      operator: Equal
      value: infra
      effect: NoSchedule

defaultRules:
  disabled:
    KubeSchedulerDown: true
    KubeControllerManagerDown: true
    KubeProxyDown: true

# k3s uses SQLite as its datastore, not etcd.
# Disabling kubeEtcd removes the etcd Grafana dashboard (which shows empty/misleading
# panels on k3s) and the etcd ServiceMonitor (which scrapes nothing on k3s).
# Control plane health is covered by the K3sControlPlaneUnhealthy alert on up{job="apiserver"}.
kubeEtcd:
  enabled: false

loki:
  enabled: true
  config:
    limits_config:
      retention_period: 744h       # 31 days
      enforce_metric_name: false
      max_cache_freshness_per_query: 10m
    compactor:
      working_directory: /data/loki/compactor
      compaction_interval: 10m
      retention_enabled: true
      retention_delete_delay: 2h
      retention_delete_worker_count: 150
  persistence:
    enabled: true
    size: 20Gi
