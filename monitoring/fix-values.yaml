grafana:
  persistence:
    enabled: true
    size: 2Gi
  service:
    type: NodePort
    nodePort: 30080
  initChownData:
    enabled: false
  nodeSelector:
    kubernetes.io/hostname: k3s-infra
  tolerations:
    - key: node-role
      operator: Equal
      value: infra
      effect: NoSchedule

prometheus:
  verticalPodAutoscaler:
    enabled: false
  service:
    type: NodePort
    nodePort: 30090

alertmanager:
  verticalPodAutoscaler:
    enabled: false
  alertmanagerSpec:
    logLevel: info
  service:
    type: NodePort
    nodePort: 30093
  config:
    global:
      resolve_timeout: 30s
    route:
      group_by: ['alertname', 'namespace', 'severity']
      group_wait: 10s
      group_interval: 30s
      repeat_interval: 4h
      receiver: gitlab-webhook
      routes:
        - match:
            severity: critical
          receiver: gitlab-webhook
          repeat_interval: 4h
        - match:
            severity: warning
          receiver: gitlab-webhook
          repeat_interval: 4h
        - match:
            severity: info
          receiver: gitlab-webhook
          repeat_interval: 24h
    receivers:
      - name: gitlab-webhook
        webhook_configs:
          - url: 'http://alertmanager-webhook:8080'
            send_resolved: true
    inhibit_rules:
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal:
          - alertname
          - namespace

defaultRules:
  disabled:
    KubeSchedulerDown: true
    KubeControllerManagerDown: true
    KubeProxyDown: true
