---
- name: Security hardening — infra node
  hosts: infra
  become: yes

  tasks:

    - name: Install fail2ban
      apt:
        name: fail2ban
        state: present
        update_cache: yes

    - name: Configure fail2ban for SSH
      copy:
        dest: /etc/fail2ban/jail.local
        content: |
          [DEFAULT]
          bantime = 3600
          findtime = 600
          maxretry = 3

          [sshd]
          enabled = true
          port = 22
          filter = sshd
          logpath = /var/log/auth.log
          maxretry = 3
          bantime = 3600

    - name: Enable and start fail2ban
      systemd:
        name: fail2ban
        enabled: yes
        state: restarted

    - name: Set SSH login banner
      copy:
        dest: /etc/issue.net
        content: |
          ******************************************
          *   Homelab Infrastructure Node         *
          *   Unauthorized access is prohibited   *
          *   All activity is monitored           *
          ******************************************

    - name: Enable SSH banner
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?Banner'
        line: 'Banner /etc/issue.net'
      notify: Restart SSH

    - name: Verify fail2ban is running
      command: fail2ban-client status sshd
      register: f2b_status
      changed_when: false

    - name: Display fail2ban status
      debug:
        msg: "{{ f2b_status.stdout_lines }}"

  handlers:
    - name: Restart SSH
      systemd:
        name: sshd
        state: restarted
