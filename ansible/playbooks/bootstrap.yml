- hosts: all
  become: true
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Ensure baseline packages
      apt:
        name:
          - curl
          - ca-certificates
          - iputils-ping
          - qemu-guest-agent
        state: present

    - name: Enable qemu guest agent
      systemd:
        name: qemu-guest-agent
        enabled: true
        state: started

    - name: Disable swap immediately (Kubernetes requirement)
      command: swapoff -a
      when: ansible_swaptotal_mb | int > 0

    - name: Comment out swap entries in /etc/fstab (persistent)
      replace:
        path: /etc/fstab
        regexp: '^([^#].*\s+swap\s+.*)$'
        replace: '# \1'

    - name: Load br_netfilter now
      modprobe:
        name: br_netfilter
        state: present

    - name: Ensure br_netfilter loads on boot
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          br_netfilter

    - name: Kubernetes sysctl settings
      copy:
        dest: /etc/sysctl.d/99-k8s.conf
        content: |
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward = 1

    - name: Apply sysctl
      command: sysctl --system
