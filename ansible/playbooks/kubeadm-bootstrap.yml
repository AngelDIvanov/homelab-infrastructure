---
# Bootstrap a kubeadm cluster: containerd, kubeadm, kubelet, kubectl
# Control plane: 192.168.122.240  Worker: 192.168.122.241
#
# Usage:
#   ansible-playbook -i inventory/kubeadm.ini playbooks/kubeadm-bootstrap.yml

- name: Common pre-reqs on all nodes
  hosts: kubeadm_all
  become: true
  vars:
    k8s_version: "1.32"
    pod_cidr: "10.244.0.0/16"   # Flannel default

  tasks:
    - name: Disable swap
      shell: swapoff -a && sed -i '/swap/d' /etc/fstab
      changed_when: false

    - name: Load kernel modules
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter

    - name: Enable kernel modules now
      shell: modprobe overlay && modprobe br_netfilter
      changed_when: false

    - name: Set sysctl for Kubernetes networking
      copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.bridge.bridge-nf-call-iptables  = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward                 = 1

    - name: Apply sysctl
      shell: sysctl --system
      changed_when: false

    - name: Install containerd dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gpg
        state: present
        update_cache: true

    - name: Add Docker GPG key (for containerd)
      shell: |
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg --yes
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker apt repo
      copy:
        dest: /etc/apt/sources.list.d/docker.list
        content: |
          deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu jammy stable

    - name: Install containerd
      apt:
        name: containerd.io
        state: present
        update_cache: true

    - name: Configure containerd with SystemdCgroup
      shell: |
        mkdir -p /etc/containerd
        containerd config default > /etc/containerd/config.toml
        sed -i 's/SystemdCgroup = false/SystemdCgroup = true/' /etc/containerd/config.toml
        sed -i 's/disabled_plugins = \["cri"\]/disabled_plugins = []/' /etc/containerd/config.toml

    - name: Restart and enable containerd
      systemd:
        name: containerd
        state: restarted
        enabled: true

    - name: Wait for containerd socket
      wait_for:
        path: /var/run/containerd/containerd.sock
        state: present
        timeout: 30

    - name: Add Kubernetes GPG key
      shell: |
        curl -fsSL https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg --yes
      args:
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

    - name: Add Kubernetes apt repo
      copy:
        dest: /etc/apt/sources.list.d/kubernetes.list
        content: |
          deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/ /

    - name: Install kubeadm, kubelet, kubectl
      apt:
        name:
          - kubeadm
          - kubelet
          - kubectl
        state: present
        update_cache: true

    - name: Hold kubeadm/kubelet/kubectl at current version
      shell: apt-mark hold kubeadm kubelet kubectl
      changed_when: false

    - name: Enable kubelet
      systemd:
        name: kubelet
        enabled: true

# ── Control plane init ─────────────────────────────────────────
- name: Initialise kubeadm control plane
  hosts: kubeadm_control
  become: true
  vars:
    pod_cidr: "10.244.0.0/16"
    control_ip: "192.168.122.240"

  tasks:
    - name: Check if cluster already initialised
      stat:
        path: /etc/kubernetes/admin.conf
      register: kubeconfig

    - name: Run kubeadm init
      shell: >
        kubeadm init
        --apiserver-advertise-address={{ control_ip }}
        --pod-network-cidr={{ pod_cidr }}
        --node-name=kubeadm-control
      when: not kubeconfig.stat.exists
      register: kubeadm_init

    - name: Create .kube dir for andy
      file:
        path: /home/andy/.kube
        state: directory
        owner: andy
        group: andy
        mode: "0755"

    - name: Copy admin.conf for andy
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/andy/.kube/config
        remote_src: true
        owner: andy
        group: andy
        mode: "0600"

    - name: Install Flannel CNI
      become: false
      shell: kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
      environment:
        KUBECONFIG: /home/andy/.kube/config

    - name: Get join command
      shell: kubeadm token create --print-join-command
      register: join_cmd

    - name: Save join command locally
      local_action: copy content="{{ join_cmd.stdout }}" dest=/tmp/kubeadm-join-cmd.sh mode="0644"

# ── Worker join ────────────────────────────────────────────────
- name: Join worker to cluster
  hosts: kubeadm_workers
  become: true

  tasks:
    - name: Check if already joined
      stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf

    - name: Read join command
      set_fact:
        join_command: "{{ lookup('file', '/tmp/kubeadm-join-cmd.sh') }}"

    - name: Join cluster
      shell: "{{ join_command }} --node-name=kubeadm-worker-1"
      when: not kubelet_conf.stat.exists
