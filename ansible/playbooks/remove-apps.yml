---
- name: Remove demo tools from all k8s nodes
  hosts: k8s_cluster
  become: yes

  tasks:

    - name: Remove neofetch
      apt:
        name: neofetch
        state: absent
        purge: yes
      ignore_errors: yes

    - name: Remove btop binary
      file:
        path: /usr/local/bin/btop
        state: absent

    - name: Remove k9s binary
      file:
        path: /usr/local/bin/k9s
        state: absent

    - name: Clean up apt
      apt:
        autoremove: yes
        autoclean: yes

    - name: Verify removals
      shell: |
        echo "neofetch: $(which neofetch 2>/dev/null || echo 'removed')"
        echo "btop:     $(which btop 2>/dev/null || echo 'removed')"
        echo "k9s:      $(which k9s 2>/dev/null || echo 'removed')"
      register: summary
      changed_when: false

    - name: Display summary
      debug:
        msg: "{{ summary.stdout_lines }}"
