---
- name: Revert security hardening — infra node
  hosts: infra
  become: yes

  tasks:

    - name: Stop and disable fail2ban
      systemd:
        name: fail2ban
        state: stopped
        enabled: no
      ignore_errors: yes

    - name: Remove fail2ban jail config
      file:
        path: /etc/fail2ban/jail.local
        state: absent

    - name: Remove SSH banner
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^Banner'
        line: '#Banner none'
      notify: Restart SSH

  handlers:
    - name: Restart SSH
      systemd:
        name: sshd
        state: restarted
