---
- name: Revert security hardening
  hosts: all
  become: yes
  
  tasks:
    - name: Disable UFW
      ufw:
        state: disabled
      tags: firewall

    - name: Stop and disable fail2ban
      systemd:
        name: fail2ban
        state: stopped
        enabled: no
      ignore_errors: yes
      tags: fail2ban

    - name: Revert SSH - Allow root login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^PermitRootLogin'
        line: '#PermitRootLogin prohibit-password'
      notify: Restart SSH
      tags: ssh

    - name: Revert SSH - Max auth tries
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^MaxAuthTries'
        line: '#MaxAuthTries 6'
      notify: Restart SSH
      tags: ssh

    - name: Remove fail2ban jail config
      file:
        path: /etc/fail2ban/jail.local
        state: absent
      tags: fail2ban

  handlers:
    - name: Restart SSH
      systemd:
        name: sshd
        state: restarted
