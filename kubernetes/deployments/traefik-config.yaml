apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    # Keep Traefik off the infra node and ensure the 2 replicas land on
    # DIFFERENT worker nodes (hard anti-affinity) so one worker failure
    # never takes down both replicas simultaneously.
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-role
                  operator: NotIn
                  values:
                    - infra
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - traefik
            topologyKey: kubernetes.io/hostname
    # 2 replicas: one per worker node. Add a third replica if a third worker is added.
    deployment:
      replicas: 2
