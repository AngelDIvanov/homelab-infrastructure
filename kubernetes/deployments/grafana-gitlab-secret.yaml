---
# Apply this once with the real token:
#   kubectl create secret generic grafana-gitlab-token \
#     --from-literal=GITLAB_TOKEN='glpat-YOUR-NEW-TOKEN-HERE' \
#     -n monitoring
#
# Grafana must have this secret mounted as an env var (envFrom or env).
# If using kube-prometheus-stack Helm chart, add to values.yaml:
#
#   grafana:
#     envFrom:
#       - secretRef:
#           name: grafana-gitlab-token
#
apiVersion: v1
kind: Secret
metadata:
  name: grafana-gitlab-token
  namespace: monitoring
type: Opaque
stringData:
  GITLAB_TOKEN: "REPLACE_WITH_NEW_TOKEN"
