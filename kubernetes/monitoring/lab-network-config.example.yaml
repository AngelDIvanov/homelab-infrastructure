---
# Copy to lab-network-config.yaml and fill in your values before applying.
# This file is committed; lab-network-config.yaml is gitignored.
#
#   cp kubernetes/monitoring/lab-network-config.example.yaml \
#      kubernetes/monitoring/lab-network-config.yaml
#   # edit lab-network-config.yaml
#   kubectl apply -f kubernetes/monitoring/lab-network-config.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: lab-network-config
  namespace: monitoring
data:
  HYPERVISOR_IP:  "<your-hypervisor-ip>"      # KVM host — runs virsh
  K3S_CONTROL_IP: "<your-control-plane-ip>"   # k3s-control node
  WORKER1_IP:     "<your-worker1-ip>"          # k3s-worker-1
  INFRA_IP:       "<your-infra-ip>"            # k3s-infra (GitLab + monitoring)
  GITLAB_IP:      "<your-infra-ip>"            # same as INFRA_IP unless split
  REGISTRY_URL:   "http://<your-control-plane-ip>:30500"
  PROMETHEUS_URL: "http://<your-control-plane-ip>:30090"
  ALERTMANAGER_URL: "http://<your-control-plane-ip>:30093"
  GITLAB_URL:     "http://<your-infra-ip>:8929"
